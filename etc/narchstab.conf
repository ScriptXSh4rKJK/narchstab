# narchstab configuration
# /etc/narchstab.conf
#
# All settings are optional — uncommented defaults are shown below.
# Lines starting with # or ; are ignored.
# Inline comments are supported: key = value  # comment

# ==========================================================================
# GENERAL
# ==========================================================================

# Path to the log file (leave empty to disable file logging)
log_file = /var/log/narchstab.log

# Lock file — prevents parallel runs
lock_file = /run/narchstab.lock

# Directory for internal state (dmesg cursor, etc.)
state_dir = /var/lib/narchstab

# ==========================================================================
# OPTIONAL INTEGRATION WITH NARCHSAFE
# ==========================================================================
# Set this to inherit Telegram credentials from an existing narchsafe config.
# Leave empty (or remove) to run fully standalone.
# narchsafe is NOT required — this is purely a convenience option.
#
# narchsafe_conf = /etc/narchsafe.conf

# ==========================================================================
# NOTIFICATIONS
# ==========================================================================

# Write events to log_file (strongly recommended)
notify_log = yes

# Desktop notifications via notify-send (requires libnotify)
notify_libnotify = no

# Telegram bot notifications
notify_telegram = no

# If notify_telegram = yes and narchsafe_conf is not set, fill these in:
# telegram_token   = 123456789:AAxxxxxxxxxxxxxxxxxxxxxxxx
# telegram_chat_id = -100xxxxxxxxx
# telegram_api_url = https://api.telegram.org

# ==========================================================================
# OOM POLICY  (narchstab oom)
# ==========================================================================

# Backend to configure:
#   auto         — prefer systemd-oomd, fall back to earlyoom
#   systemd-oomd — use systemd-oomd (built into modern systemd)
#   earlyoom     — use earlyoom (install: pacman -S earlyoom)
#   none         — do nothing
oom_backend = auto

# Kill processes when memory usage exceeds this percentage (1-100)
oom_mem_threshold = 90

# Kill processes when swap usage exceeds this percentage (1-100)
oom_swap_threshold = 90

# ==========================================================================
# DMESG-WATCH  (narchstab dmesg)
# ==========================================================================

# Scan from the start of the current boot (yes) or only since last run (no)
dmesg_since_boot = yes

# Minimum severity level to report:
#   emerg | alert | crit | err | warn | notice
# "warn" catches everything except info/debug noise.
dmesg_severity = warn

# ==========================================================================
# FAILED-REPORT  (narchstab report)
# ==========================================================================

# Number of journal lines to include per failed unit
report_journal_lines = 30

# Where to write the report:
#   stdout — print to terminal
#   file   — write to report_file
report_output = stdout

# Only used when report_output = file
report_file = /var/log/narchstab-report.log
